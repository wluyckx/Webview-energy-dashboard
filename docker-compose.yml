services:
  dashboard:
    image: ghcr.io/wluyckx/energy-dashboard:latest
    container_name: energy-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    networks:
      default:
        aliases:
          - en_dashboard
    environment:
      CSP_CONNECT_HOSTS: "https://hestia.wimluyckx.dev"

networks:
  default:
    name: edge
    external: true
